services:
  dictionarypy:
    build:
      context: .
      dockerfile: Dockerfile.novnc
    container_name: dictionarypy
    ports:
      - "5800:5800"   # UI web (noVNC)
      - "5900:5900"   # VNC opcional
    environment:
      - TZ=Europe/Madrid
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=800
    volumes:
      - ./data:/config   # Persistencia: DB (words.db), logs, etc., quedan en ./data
    restart: unless-stopped
